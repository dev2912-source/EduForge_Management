version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      # You can inject your existing Atlas URI here for local testing:
      - MONGO_URI=${MONGO_URI:-mongodb://127.0.0.1:27017/edufordge}
      - JWT_SECRET=${JWT_SECRET:-secretkey123}

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend
